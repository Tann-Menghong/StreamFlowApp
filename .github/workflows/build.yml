name: Build APK

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish a release for (e.g. v0.1.0). Leave empty to just build."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Build debug APK
        run: |
          if [ -n "${{ steps.release.outputs.tag }}" ]; then
            VERSION_NAME="${{ steps.release.outputs.tag }}"
            VERSION_NAME="${VERSION_NAME#v}"
            ./gradlew assembleDebug --no-daemon \
              -PreleaseVersionName="$VERSION_NAME" \
              -PreleaseVersionCode=${{ github.run_number }}
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: streamflow-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Prepare release APK
        if: steps.release.outputs.tag != ''
        run: cp app/build/outputs/apk/debug/*.apk streamflow-${{ steps.release.outputs.tag }}-debug.apk

      - name: Create GitHub Release
        if: steps.release.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: streamflow-${{ steps.release.outputs.tag }}-debug.apk
          generate_release_notes: true
